<div class="profile-container">

  <!-- HEADER -->
  <div class="profile-header">
    <h2>Profile</h2>
  </div>

  <!-- PROFILE CARD -->
  <div class="profile-card">

    <img src="https://i.pravatar.cc/150" class="avatar">

    <h3>{{user.name}}</h3>
    <p class="username">{{ '@' + user.username }}</p>

    <button class="edit-btn" (click)="goToEdit()">Edit Profile</button>

  </div>

  <!-- OPTIONS -->
  <div class="profile-options">

    <div class="option" (click)="goToEdit()">
      ⚙️ Profile Settings
    </div>

    <div class="option">
      🔒 Change Password
    </div>

    <div class="option logout" (click)="logout()">
      🚪 Logout
    </div>

  </div>

</div>
